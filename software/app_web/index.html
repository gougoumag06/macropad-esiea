<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACROPAD Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="topbar">
        <div class="logo">MACROPAD<span>.</span></div>
        <div class="connection-status">
            <select id="osSelect" class="top-select">
                <option value="windows">Windows</option>
                <option value="linux">Linux</option>
            </select>
            <select id="layoutSelect" class="top-select">
                <option value="AZERTY">AZERTY</option>
                <option value="QWERTY">QWERTY</option>
            </select>
            <button id="connectBtn" class="btn-connect">Connecter & Éditer</button>
        </div>
    </nav>

    <main class="app-container">
        <section class="pad-viewer">
            <div class="macropad-device">
                <div class="key" data-id="0" id="key_0">
                    <div class="key-header">Touche 1 <span class="pin-display" id="pinDisplay_0"></span></div>
                    <span class="macro-text" id="macro_0">--</span>
                </div>
                <div class="key" data-id="1" id="key_1">
                    <div class="key-header">Touche 2 <span class="pin-display" id="pinDisplay_1"></span></div>
                    <span class="macro-text" id="macro_1">--</span>
                </div>
                <div class="key" data-id="2" id="key_2">
                    <div class="key-header">Touche 3 <span class="pin-display" id="pinDisplay_2"></span></div>
                    <span class="macro-text" id="macro_2">--</span>
                </div>
                <div class="key" data-id="3" id="key_3">
                    <div class="key-header">Touche 4 <span class="pin-display" id="pinDisplay_3"></span></div>
                    <span class="macro-text" id="macro_3">--</span>
                </div>
                <div class="key" data-id="4" id="key_4">
                    <div class="key-header">Touche 5 <span class="pin-display" id="pinDisplay_4"></span></div>
                    <span class="macro-text" id="macro_4">--</span>
                </div>
                <div class="key" data-id="5" id="key_5">
                    <div class="key-header">Touche 6 <span class="pin-display" id="pinDisplay_5"></span></div>
                    <span class="macro-text" id="macro_5">--</span>
                </div>
            </div>
            <div id="log" class="status-log">État : Déconnecté du clavier.</div>
        </section>

        <aside class="sidebar">
            <h2>Assignation</h2>
            <div class="target-indicator">
                Cible : <span id="targetName">SÉLECTIONNEZ UNE TOUCHE</span>
            </div>

            <div class="setting-group disabled" id="editorPanel">
                <div class="form-group">
                    <label>Comportement</label>
                    <select id="actionType" class="top-select">
                        <option value="shortcut">Raccourci clavier / Système</option>
                        <option value="text">Taper un texte (Macro)</option>
                        <option value="launch">Lancer une App / Site</option>
                    </select>
                </div>

                <div class="form-group">
                    <label id="valueLabel">Valeur / Macro</label>
                    <div class="input-row">
                        <input type="text" id="actionValue" placeholder="ex: CTRL+C ou Bonjour">
                        <button id="recordBtn" class="btn-record">⏺️ Capturer</button>
                    </div>
                </div>

                <div class="library">
                    <label>BIBLIOTHÈQUE DE MACROS</label>
                    
                    <div class="lib-category">Web & Applications</div>
                    <div class="grid-2">
                        <button class="lib-btn" onclick="setLaunch('https://www.youtube.com')">YouTube</button>
                        <button class="lib-btn" onclick="setLaunch('https://github.com')">GitHub</button>
                        <button class="lib-btn" onclick="setApp('calc', 'gnome-calculator')">Calculatrice</button>
                        <button class="lib-btn" onclick="setApp('notepad', 'note')">Bloc-notes</button>
                    </div>

                    <div class="lib-category">Fenêtres & Système</div>
                    <div class="grid-2" id="presets-windows">
                        <button class="lib-btn" onclick="setPreset('GUI+D')">Afficher Bureau</button>
                        <button class="lib-btn" onclick="setPreset('GUI+E')">Explorateur</button>
                        <button class="lib-btn" onclick="setPreset('GUI+L')">Verrouiller PC</button>
                        <button class="lib-btn" onclick="setPreset('GUI+SHIFT+S')">Capture d'écran</button>
                    </div>
                    <div class="grid-2" id="presets-linux" style="display: none;">
                        <button class="lib-btn" onclick="setPreset('GUI+D')">Afficher Bureau</button>
                        <button class="lib-btn" onclick="setLaunch('xdg-open ~')">Fichiers (Home)</button>
                        <button class="lib-btn" onclick="setPreset('GUI+L')">Verrouiller PC</button>
                        <button class="lib-btn" onclick="setPreset('CTRL+ALT+T')">Ouvrir Terminal</button>
                    </div>

                    <div class="lib-category">Édition & Texte</div>
                    <div class="grid-2">
                        <button class="lib-btn" onclick="setPreset('CTRL+C')">Copier</button>
                        <button class="lib-btn" onclick="setPreset('CTRL+V')">Coller</button>
                        <button class="lib-btn" onclick="setPreset('CTRL+X')">Couper</button>
                        <button class="lib-btn" onclick="setPreset('CTRL+Z')">Annuler</button>
                    </div>
                </div>
            </div>

            <button id="applyBtn" class="btn-apply" disabled>APPLIQUER AU CLAVIER</button>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
